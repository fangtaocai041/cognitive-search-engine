# ☯️ TAO Architecture — V (Validation/阴)
# 阴: 收敛、批判、校验
tao:
  role: "V"
  yin_yang: "阴 (收敛·验证)"
  standalone: true
  triangle_connected: true
  microcosmos:
    capabilities:
      - "Hub-and-Spoke species search"
      - "OCR variant generation"
      - "Credibility scoring (0-100)"
      - "Cross-project independence enforcement"
    limitations:
      - "No cross-project coordination without T"
      - "No domain knowledge without S"
  triangle:
    connects_to: ["T (meso-cosmos)"]
    pipeline: "Hub-and-Spoke: Locate → Extract → Gap Detection"

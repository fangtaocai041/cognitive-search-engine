# ENGINEERING: params auto-adjusted per trigger conditions after each search.
# All values are machine-readable; ranges define safe boundaries; triggers use exact thresholds.

evolution:
  enabled: true

  # 自适应参数
  adaptive_params:
    satisfice_threshold:
      current: 8
      range: [5, 20]
      adjust_by: "recall_gap"  # 如果经常遗漏论文 → 提高阈值
      last_adjusted: "2026-06-06"
      
    ig_prune_threshold:
      current: 0.005
      range: [0.001, 0.02]
      adjust_by: "false_positive_rate"
      last_adjusted: "2026-06-06"

    trust_score_threshold:
      current: 50
      range: [30, 70]
      adjust_by: "verification_error_rate"
      last_adjusted: "2026-06-06"

    max_graph_depth:
      current: 3
      range: [1, 5]
      adjust_by: "diminishing_return_rate"
      last_adjusted: "2026-06-06"

  # 进化日志
  evolution_log:
    path: ".evolution/evolution-log.jsonl"
    fields: [timestamp, param, old_value, new_value, trigger, effectiveness_delta]

  # 自我反馈循环
  feedback_loop:
    # 每次搜索后评估效果
    post_search_evaluation: true
    metrics:
      - recall_vs_expected    # 找到的 vs 预估文献量
      - new_papers_rate        # 新发现论文比例
      - token_efficiency       # papers / 1000 tokens
      - false_positive_rate    # 验证失败的论文比例

    # 触发自进化的条件
    evolution_triggers:
      recall_drop:            # 连续 3 次搜索 recall < 50%
        condition: "recall_vs_expected < 0.5 for 3 consecutive searches"
        action: "increase satisfice_threshold by 2 AND activate more layers"
      efficiency_gain:         # 连续 5 次搜索效率提升
        condition: "token_efficiency > baseline × 1.2 for 5 consecutive searches"
        action: "prune lowest-IG layer"
      false_positive_spike:    # 验证失败率飙升
        condition: "false_positive_rate > 0.15 for 2 consecutive searches"
        action: "increase trust_score_threshold by 10"
      new_species_discovered:  # 图谱中发现新物种
        condition: "graph_node_count increased by > 20% in one search"
        action: "log discovery + suggest building dedicated species_graph entry"

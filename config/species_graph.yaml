    abstract: 'The Chinese lake gudgeon Sarcocheilichthys sinensis is a small cyprinid
      fish with great aquaculture potential both for its edible and ornamental values.
      Nevertheless, available genomic and transcriptomic information for this fish
      is extremely deficient. In this study, a normalized cDNA library was constructed
      using 13 mixed tissues of an adult male S. sinensis, and was sequenced by the

    abstract: 'The minimum viable population (MVP) size has been compared for a wide
      range of organisms in conservation biology, but a limited number of studies
      investigated it for freshwater fishes, which exhibit diverse life history strategies.
      In this study, the MVP size and population growth rate of 36 fish species in
      the Yangtze River were estimated and compared with their life-history traits.
      The results indicated that the MVP size ranged from 42 to 320 individuals, and
      instantaneous per-capita population growth rate ranged from 0.009 to 0.188 per

    abstract: 'The global incidence of thyroid cancer (TC) has markedly increased
      in recent years, making it the most prevalent endocrine‑related cancer worldwide.
      TC primarily originates from follicular and parafollicular cells of the thyroid
      gland, and includes four main pathological types: Papillary TC (PTC), follicular
      TC, medullary TC (MTC) and anaplastic TC. Notably, characteristic oncogenes
      and tumor suppressor genes are associated with TC, which are considered targets
      for the development of treatment strategies. The rearranged during transfection
      (RET) gene serves a pivotal role in the development of TC, and mutations and
      fusions of this gene are closely associated with the onset of MTC and PTC. The

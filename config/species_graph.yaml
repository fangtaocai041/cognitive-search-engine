      river fish. Monitoring the species composition of drifting eggs during spawning
      season is important for protection issues. In this study, we have sampled drifting
      fish eggs in nine locations from 2014 to 2016. Eggs were identified using the
      mitochondrial cyt <i>b</i> gene sequence. A total of 7,933 fish eggs were sequenced

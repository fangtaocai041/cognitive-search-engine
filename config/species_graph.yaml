    abstract: 'As a flagship species in marine, the conservation of <i>Acipenser sinensis</i>
      habitat is of great significance for biodiversity maintenance. Based on 339
      records of <i>A. sinensis</i> bycatch in the ocean and related environmental
      data from 2022 to 2023, we investigated its distribution characteristics and
      habitat selection using the MaxEnt model. The results showed that <i>A. sinensis</i>
      was primarily distributed in the waters of Hangzhou Bay and the Xiangshan area,
      with a relatively broad range in spring and winter, while the distribution was

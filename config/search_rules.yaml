version: 3.0.0
phases:
  graph_lookup:
    function: load_known_papers
    language: both
    inputs:
      species_id: $species_id
    source: config/species_graph.yaml
    output: list[Paper]
    budget: 0
    priority: 0
    stop_condition: len(output) >= config.search.energy.min_papers_satisfice
  exact_search:
    function: search_scholar_article
    language: en
    inputs:
      query: $genus $species
    tools:
    - scholar_search_literature_graph
    - article_search_literature
    - ncbi_ncbi_esearch
    - serpapi_scholar
    - duckduckgo_search
    output: list[Paper]
    budget: 600
    priority: 2
  chinese_exact_search:
    function: search_chinese_scholar
    language: zh
    inputs:
      query: $chinese_name
    tools:
    - baidu_scholar
    - cnki_web
    - wanfang_web
    - cas_web
    - serpapi_scholar
    - duckduckgo_search
    - scholar_graph
    - crossref_article
    - ncbi_esearch
    - chinese_sweep
    - web_search
    output: list[Paper]
    budget: 1200
    priority: 1.5
    activation: bool(chinese_name)
    parallel: true
    group: chinese
  author_crossref:
    function: search_by_authors
    language: both
    inputs:
      authors: $graph.authors[species_id]
      min_year: $min_year
    tools:
    - scholar_search_google_scholar_key_words
    - scholar_search_literature_graph
    output: list[Paper]
    budget: 1500
    priority: 2
    activation: bool($graph.authors)
  review_mining:
    function: mine_review_references
    language: both
    inputs:
      papers: $all_papers
    tools:
    - article_get_references
    output: list[Paper]
    budget: 500
    priority: 3
    activation: 'any(filter(papers, λp: p.title matches review_pattern))'
    stop_condition: len(all_papers) >= config.search.energy.min_papers_satisfice
  reference_verification:
    function: verify_references
    inputs:
      papers: $review_mined_papers
    tools:
    - scholar_search_literature_graph
    output: dict[Paper, TrustLevel]
    budget: 1000
    priority: 4
    activation: len(review_mined_papers) > 0
    params:
      trust_threshold_verified: 80
      trust_threshold_tentative: 50
  citation_traversal:
    function: traverse_citation_graph
    language: both
    inputs:
      papers: $all_papers_with_doi
      max_depth: 3
    tools:
    - article_get_references
    - article_get_literature_relations
    output: list[Paper]
    budget: 1000
    priority: 5
    activation: len(all_papers_with_doi) >= 3
    stop_condition: len(all_papers) >= config.search.energy.min_papers_satisfice
  variant_search:
    function: search_variants
    language: both
    inputs:
      genus: $genus
      species: $species
      variants: $graph.variants[species_id]
    tools:
    - scholar_search_literature_graph
    - article_search_literature
    - ncbi_ncbi_esearch
    - tavily_search
    - exa_web_search
    - baidu_scholar
    - biorxiv_api
    - serpapi_scholar
    - duckduckgo_search
    output: list[Paper]
    budget: 3000
    priority: 6
  preprint_search:
    function: search_preprints
    language: en
    inputs:
      query: $genus $species
    tools:
    - biorxiv_api
    - researchgate_web
    - scholar_graph
    output: list[Paper]
    budget: 600
    priority: 6.5
    activation: len(all_papers) < 30 OR year(current) - year(min) < 3
    parallel: true
    group: preprint
  phonetic_search:
    function: search_phonetic
    inputs:
      soundex: $soundex(genus)
      metaphone: $metaphone(genus)
    tools:
    - scholar_search_literature_graph
    - ncbi_ncbi_esearch
    - web_search
    output: list[Paper]
    budget: 800
    priority: 7
    activation: len(genus) > 6 AND len(all_papers) < 10
  journal_scan:
    function: scan_target_journals
    language: zh
    inputs:
      journals: $graph.journals[species_id]
      keyword: $chinese_name
    tools:
    - scholar_search_literature_graph
    - ncbi_ncbi_esearch
    - article_search_literature
    - cnki_web
    - baidu_scholar
    output: list[Paper]
    budget: 1500
    priority: 8
  llm_expansion:
    function: llm_query_expansion
    inputs:
      genus: $genus
      species: $species
      context: $semiotic_context
    tools:
    - thinking_sequentialthinking
    - scholar_search_literature_graph
    - tavily_search
    - exa_web_search
    - web_search
    - biorxiv_api
    - chinese_sweep
    output: list[Paper]
    budget: 3500
    priority: 9
    activation: len(all_papers) < 5
  dedup_merge:
    function: deduplicate_and_merge
    inputs:
      papers: $all_papers
    output: list[Paper]
    budget: 0
    priority: 99
    params:
      primary_key: doi
      secondary_key: title_similarity
      similarity_threshold: 0.9
      zn_en_dedup:
        enabled: true
        match_key: title_zh
        fallback_to_translation: true
        keep: prefer_zh
stop_conditions:
  global:
  - condition: consecutive_zero_new >= 5
    action: STOP_ALL
  - condition: total_tokens >= config.search.energy.max_total_tokens
    action: STOP_ALL
  - condition: len(ig_history) >= 3 AND all(v < 0.003 for v in ig_history[-3:])
    action: STOP_ALL
adaptive_params:
  satisfice_threshold:
    value: 8
    range:
    - 5
    - 20
    step: 2
    trigger: recall < 0.5 FOR 3 CONSECUTIVE searches
  trust_threshold:
    value: 50
    range:
    - 30
    - 70
    step: 10
    trigger: fp_rate > 0.15 FOR 2 CONSECUTIVE searches
  graph_depth:
    value: 3
    range:
    - 1
    - 5
    step: 1
    trigger: new_papers_rate < 0.05 FOR 5 CONSECUTIVE searches

# ── Search Tiers & Intent ─────────────────────────────────
# Tier 1 = 综合入口 (先搜)  Tier 2 = 领域专业 (再搜)
# Tier 3 = 机构特藏 (按需)   Tier 4 = 原始数据 (仅数据需求)

search_tiers:
  tier_1_general:
    label: "综合入口"
    description: "先搜这些——覆盖面最广，含期刊论文、预印本、学位论文"
    dbs: ["pubmed", "crossref", "openalex", "semantic_scholar", "google_scholar", "web_of_science", "cnki", "scopus", "wanfang", "baidu_scholar"]
  tier_2_specialized:
    label: "领域专业"
    description: "Tier1结果不够时展开——细分学科数据库、中文核心期刊"
    dbs: ["biodiversity_science", "acta_hydrobiologica", "south_china_fisheries",
          "journal_fisheries_china", "fishsci_china", "fishbase", "iucn_redlist",
          "epa_comptox", "ecotox", "pubchem", "ncbi_nucleotide", "ncbi_genome",
          "uniprot", "ena", "usgs", "noaa", "nasa_earthdata", "copernicus",
          "arxiv", "papers_with_code", "huggingface", "github",
          "pubmed_central", "clinical_trials", "inaturalist", "ebird",
          "asfa", "cab_abstracts", "jstor", "genbank", "bold_systems",
          "ensembl", "kegg", "cqvip", "ctd", "researchgate"]
  tier_3_institutional:
    label: "机构特藏"
    description: "中科院/高校图书馆/学位论文——知网不覆盖的特藏"
    dbs: ["cas_ir", "nstl_thesis", "proquest_dissertations", "cnki_thesis", "wanfang_thesis", "ndltd"]
  tier_4_raw_data:
    label: "原始数据"
    description: "仅当用户明确需要数据时搜索——实验数据、分布记录、统计数据"
    dbs: ["dryad", "gbif", "obis", "fao_fisheries", "zenodo", "figshare", "pangaea", "worldclim", "dataone", "kaggle"]

# Intent detection: query keywords → search mode
intent_rules:
  literature:
    triggers: ["文献", "论文", "研究", "综述", "review", "paper", "发表", "期刊", "参考文献"]
    tiers: ["tier_1_general", "tier_2_specialized"]
    description: "学术论文搜索"
  data:
    triggers: ["数据", "下载", "dataset", "原始数据", "fasta", "序列", "sequence", "csv", "excel", "分布记录"]
    tiers: ["tier_4_raw_data"]
    description: "原始数据搜索"
  thesis:
    triggers: ["学位论文", "硕士", "博士", "dissertation", "thesis", "毕业论文"]
    tiers: ["tier_3_institutional", "tier_1_general"]
    description: "学位论文搜索"
  comprehensive:
    triggers: ["所有", "全部", "穷举", "完整", "一切", "全量", "all", "comprehensive"]
    tiers: ["tier_1_general", "tier_2_specialized", "tier_3_institutional", "tier_4_raw_data"]
    description: "全量搜索"

# ── Search Strategy Metadata ─────────────────────────────

search_strategies:
  paywall_bypass:
    priority_paths:
      - "preprint"       # bioRxiv, ResearchSquare, arXiv
      - "institutional"  # 机构知识库 (CAS IR, 高校图书馆)
      - "researchgate"   # 作者上传

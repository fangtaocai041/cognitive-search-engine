    - fisheries
    - ichthyology
    - survey
    - resource
    - habitat
    - migration
    - spawning
    - growth
    - reproduction
    - 鱼类
    - 渔业
    - 调查
    - 渔获
    - 资源
    - 栖息
    - 洄游
    - 群落
    - 种群
    - 生态
    - ecology
    databases:
    - id: cnki
      access: paid
      search_tools:
      - web_search
      search_template: site:cnki.net {keyword} 鱼类
    - id: scholar_google
      access: free
      search_tools:
      - scholar_search_literature_graph
      - scholar_search_google_scholar_key_words
      search_template: '{keyword}'
    - id: crossref
      access: free
      search_tools:
      - article_search_literature
      search_template: '{keyword}'

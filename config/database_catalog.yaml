        url: "https://gbif.org"
        access: "free"
        type: "species_occurrence"
        coverage: "global"
        language: ["en"]
        search_tools: ["web_search"]
        search_template: "site:gbif.org/species {species_name}"
        description: "物种全球分布记录，含经纬度/时间"

      - id: "obis"

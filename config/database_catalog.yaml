# ── Graph Topology (v1.0) ────────────────────────────────
# Extends the flat catalog with graph edges for weighted routing.
# Nodes = database.id + domain_id (from above). Edges below.
#
# Query routing:
#   1. Extract entities from query → match domain nodes
#   2. Traverse edges from matched domains → score databases by edge weight
#   3. Combine scores → ranked list → top-N parallel search

topology:
  # ── DB → Domain edges (weight = relevance of DB for that domain) ──
  db_domain_edges:
    # PubMed serves many domains with different weights
    - { from: "pubmed", to: "fisheries_ichthyology", weight: 0.85 }
    - { from: "pubmed", to: "molecular_genetics", weight: 0.95 }
    - { from: "pubmed", to: "ecology_biodiversity", weight: 0.80 }
    - { from: "pubmed", to: "toxicology", weight: 0.90 }
    - { from: "pubmed", to: "morphology", weight: 0.75 }
    - { from: "pubmed", to: "biomedical", weight: 0.98 }

    # Chinese databases → primarily fisheries/ecology
    - { from: "cnki", to: "fisheries_ichthyology", weight: 0.80 }
    - { from: "cnki", to: "molecular_genetics", weight: 0.60 }
    - { from: "cnki", to: "ecology_biodiversity", weight: 0.75 }
    - { from: "cnki", to: "morphology", weight: 0.70 }
    - { from: "biodiversity_science", to: "fisheries_ichthyology", weight: 0.85 }
    - { from: "biodiversity_science", to: "ecology_biodiversity", weight: 0.95 }
    - { from: "biodiversity_science", to: "molecular_genetics", weight: 0.70 }
    - { from: "acta_hydrobiologica", to: "fisheries_ichthyology", weight: 0.95 }
    - { from: "acta_hydrobiologica", to: "ecology_biodiversity", weight: 0.85 }
    - { from: "south_china_fisheries", to: "fisheries_ichthyology", weight: 0.92 }
    - { from: "journal_fisheries_china", to: "fisheries_ichthyology", weight: 0.90 }
    - { from: "fishsci_china", to: "fisheries_ichthyology", weight: 0.88 }

    # Species/data DBs → narrow domains
    - { from: "dryad", to: "fisheries_ichthyology", weight: 0.70 }
    - { from: "dryad", to: "molecular_genetics", weight: 0.65 }
    - { from: "dryad", to: "ecology_biodiversity", weight: 0.80 }
    - { from: "fishbase", to: "fisheries_ichthyology", weight: 0.98 }
    - { from: "iucn_redlist", to: "fisheries_ichthyology", weight: 0.75 }
    - { from: "iucn_redlist", to: "ecology_biodiversity", weight: 0.85 }
    - { from: "gbif", to: "fisheries_ichthyology", weight: 0.80 }
    - { from: "gbif", to: "ecology_biodiversity", weight: 0.95 }
    - { from: "obis", to: "fisheries_ichthyology", weight: 0.80 }

    # Genetics-specific
    - { from: "ncbi_nucleotide", to: "molecular_genetics", weight: 0.98 }
    - { from: "ncbi_genome", to: "molecular_genetics", weight: 0.98 }
    - { from: "uniprot", to: "molecular_genetics", weight: 0.90 }
    - { from: "ena", to: "molecular_genetics", weight: 0.88 }

    # Ecology/academic
    - { from: "crossref", to: "ecology_biodiversity", weight: 0.85 }
    - { from: "crossref", to: "fisheries_ichthyology", weight: 0.80 }
    - { from: "crossref", to: "molecular_genetics", weight: 0.80 }
    - { from: "openalex", to: "ecology_biodiversity", weight: 0.85 }
    - { from: "openalex", to: "fisheries_ichthyology", weight: 0.80 }
    - { from: "semantic_scholar", to: "ecology_biodiversity", weight: 0.82 }
    - { from: "semantic_scholar", to: "molecular_genetics", weight: 0.85 }
    - { from: "google_scholar", to: "ecology_biodiversity", weight: 0.80 }
    - { from: "google_scholar", to: "fisheries_ichthyology", weight: 0.80 }
    - { from: "google_scholar", to: "molecular_genetics", weight: 0.80 }

    # Tox/environmental
    - { from: "epa_comptox", to: "toxicology", weight: 0.95 }
    - { from: "ecotox", to: "toxicology", weight: 0.95 }
    - { from: "pubchem", to: "toxicology", weight: 0.90 }

    # Earth science
    - { from: "usgs", to: "earth_science", weight: 0.90 }
    - { from: "noaa", to: "earth_science", weight: 0.88 }
    - { from: "nasa_earthdata", to: "earth_science", weight: 0.92 }
    - { from: "copernicus", to: "earth_science", weight: 0.90 }

    # AI/ML
    - { from: "arxiv", to: "ai_ml", weight: 0.95 }
    - { from: "papers_with_code", to: "ai_ml", weight: 0.90 }
    - { from: "huggingface", to: "ai_ml", weight: 0.85 }
    - { from: "github", to: "ai_ml", weight: 0.80 }

    # Biomedical
    - { from: "pubmed_central", to: "biomedical", weight: 0.95 }
    - { from: "clinical_trials", to: "biomedical", weight: 0.90 }

    # Citizen science
    - { from: "inaturalist", to: "ecology_biodiversity", weight: 0.75 }
    - { from: "ebird", to: "ecology_biodiversity", weight: 0.70 }
    - { from: "fao_fisheries", to: "fisheries_ichthyology", weight: 0.70 }

  # ── DB → DB edges (complementarity) ──
  db_complement_edges:
    # PubMed ↔ Dryad: papers + raw data
    - { from: "pubmed", to: "dryad", weight: 0.50, reason: "PubMed论文+Dryad原始数据互补" }
    # PubMed ↔ PubMed Central: metadata + fulltext
    - { from: "pubmed", to: "pubmed_central", weight: 0.70, reason: "PubMed元数据+PMC全文" }
    # Chinese journals complement each other
    - { from: "biodiversity_science", to: "acta_hydrobiologica", weight: 0.40, reason: "生物多样性+水生生物学报互补" }
    # CrossRef ↔ OpenAlex: overlap but complementary coverage
    - { from: "crossref", to: "openalex", weight: 0.30, reason: "CrossRef DOI+OpenAlex知识图谱互补" }
    # Google Scholar ↔ PubMed: scholar finds preprints & Chinese papers
    - { from: "google_scholar", to: "pubmed", weight: 0.45, reason: "Scholar补PubMed中文盲区" }
    # GBIF ↔ FishBase: occurrence + traits
    - { from: "gbif", to: "fishbase", weight: 0.55, reason: "GBIF分布+FishBase生物学特性" }

  # ── Domain → Domain edges (cross-domain relevance) ──
  domain_edges:
    - { from: "fisheries_ichthyology", to: "ecology_biodiversity", weight: 0.85 }
    - { from: "fisheries_ichthyology", to: "molecular_genetics", weight: 0.70 }
    - { from: "fisheries_ichthyology", to: "morphology", weight: 0.60 }
    - { from: "fisheries_ichthyology", to: "toxicology", weight: 0.40 }
    - { from: "ecology_biodiversity", to: "molecular_genetics", weight: 0.65 }
    - { from: "ecology_biodiversity", to: "earth_science", weight: 0.50 }
    - { from: "ecology_biodiversity", to: "toxicology", weight: 0.55 }
    - { from: "molecular_genetics", to: "biomedical", weight: 0.75 }
    - { from: "molecular_genetics", to: "morphology", weight: 0.50 }
    - { from: "toxicology", to: "biomedical", weight: 0.70 }
    - { from: "toxicology", to: "earth_science", weight: 0.45 }
    - { from: "morphology", to: "ai_ml", weight: 0.30 }

  # ── Tendril health mapping (catalog DB → eon-core tendril) ──
  # When graph_route(health_aware=True), DBs with unhealthy tendrils
  # are demoted by the penalty factor. DBs not in this map pass through.
  tendril_map:
    pubmed: "tendril_pubmed"
    cnki: "tendril_cnki"
    crossref: "tendril_crossref"
    openalex: "tendril_openalex"
    semantic_scholar: "tendril_semantic_scholar"
    google_scholar: "tendril_google_scholar"
    web_of_science: "tendril_web_of_science"
  # Health penalty: multiply DB score by this factor when tendril is unhealthy
  tendril_unhealthy_penalty: 0.2

  # ── Context reweighting rules ──
  # Adjust domain scores when specific domain combinations co-occur.
  # Prevents generic subject domains from hijacking specialized queries.
  context_rules:
    # When toxicology + fisheries co-occur, toxicology dominates
    - { type: "boost",    if: ["toxicology", "fisheries_ichthyology"], target: "toxicology", factor: 2.0 }
    - { type: "suppress", if: ["toxicology", "fisheries_ichthyology"], target: "fisheries_ichthyology", factor: 0.25 }
    # When molecular_genetics + fisheries co-occur, genetics leads
    - { type: "boost",    if: ["molecular_genetics", "fisheries_ichthyology"], target: "molecular_genetics", factor: 1.5 }
    # When biomedical + molecular_genetics co-occur, biomedical leads
    - { type: "boost",    if: ["biomedical", "molecular_genetics"], target: "biomedical", factor: 1.3 }
    # When morphology + fisheries, morphology is the focus
    - { type: "boost",    if: ["morphology", "fisheries_ichthyology"], target: "morphology", factor: 1.5 }
    - { type: "suppress", if: ["morphology", "fisheries_ichthyology"], target: "fisheries_ichthyology", factor: 0.4 }

# config/database_catalog.yaml — 领域数据库目录
# ============================================================
# Canonical registry of searchable databases organized by domain.
# Referenced by: domain-search Skill, project_loader, TendrilManager
# Path: eon-core/config/database_catalog.yaml
# Access from any project: ../eon-core/config/database_catalog.yaml
# ============================================================

catalog_version: "1.0.0"
last_updated: "2026-06-08"

# ── Domain → Database Mapping ─────────────────────────────

domains:

  # ═══════════════════════════════════════════════════════
  # 🐟 渔业与鱼类学 (Fisheries & Ichthyology)
  # ═══════════════════════════════════════════════════════
  fisheries_ichthyology:
    label: "渔业与鱼类学"
    icon: "🐟"
    triggers: ["鱼", "fish", "鳤", "鲥", "鲟", "江豚", "fishery", "aquaculture", "水产", "淡水鱼类", "海洋渔业",
               "Ochetobius", "Coilia", "Neophocaena", "Acipenser", "Myxocyprinus"]
    databases:

      - id: "pubmed"
        name: "PubMed"
        url: "https://pubmed.ncbi.nlm.nih.gov"
        access: "free"
        type: "academic_papers"
        coverage: "global"
        language: ["en"]
        search_tools: ["ncbi_ncbi_esearch", "ncbi_ncbi_efetch", "article_search_literature"]
        description: "生物医学与生命科学论文，含 PMID/PMCID/DOI"

      - id: "dryad"
        name: "Dryad Digital Repository"
        url: "https://datadryad.org"
        access: "free"
        type: "research_data"
        coverage: "global"
        language: ["en"]
        search_tools: ["web_search", "playwright_browser_navigate"]
        download_notes: "需浏览器 session cookie，API 下载需 bearer token"
        description: "原始研究数据（CSV/Excel/R脚本），CC0 许可证"

      - id: "fishbase"
        name: "FishBase"
        url: "https://fishbase.se"
        access: "free"
        type: "species_database"
        coverage: "global"
        language: ["en"]
        search_tools: ["web_search"]
        search_template: "site:fishbase.se {species_name}"
        description: "全球鱼类物种数据库，含分布/生态/分类"

      - id: "iucn_redlist"
        name: "IUCN Red List"
        url: "https://iucnredlist.org"
        access: "free"
        type: "conservation_status"
        coverage: "global"
        language: ["en"]
        search_tools: ["web_search"]
        search_template: "site:iucnredlist.org {species_name}"
        description: "物种濒危等级评估（CR/EN/VU/NT/LC）"

      - id: "gbif"

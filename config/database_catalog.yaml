catalog_version: 2.1.0
domains:
  molecular_genetics:
    label: 分子遗传学
    triggers:
    - genetic
    - diversity
    - population
    - mitochondrial
    - microsatellite
    - snp
    - ssr
    - haplotype
    - phyloge
    - 遗传
    - 群体
    - 多态
    - 线粒体
    - 分子标记
    - 系统发育
    - phylogen
    - 进化
    databases:
    - id: ncbi_pubmed
      access: free
      search_tools:
      - ncbi_ncbi_esearch
      - ncbi_ncbi_efetch
      search_template: '{species_name}[Title/Abstract]'
    - id: ncbi_nucleotide
      access: free
      search_tools:
      - ncbi_ncbi_esearch
      search_template: '{species_name}[Organism]'
  fisheries_ichthyology:

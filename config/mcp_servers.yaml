# Cognitive Search Engine — MCP Server Configuration
# 搜索引擎集成：同步自 Reasonix Desktop config.json

servers:
  scholar:
    name: Scholar MCP
    command: npx
    args: ["-y", "scholar-mcp"]
    description: Google Scholar via MCP — 最强模糊匹配

  article:
    name: Article MCP
    command: npx
    args: ["-y", "article-mcp"]
    description: Europe PMC + PubMed + Crossref 全文搜索

  scholarly:
    name: Scholarly Research MCP
    command: npx
    args: ["-y", "scholarly-research-mcp"]
    description: 多源学术搜索 (OpenAlex + Semantic Scholar)

  tavily:
    name: Tavily Search
    command: npx
    args: ["-y", "tavily-mcp@latest"]
    description: AI 深度网络搜索

  exa:
    name: Exa Search
    command: npx
    args: ["-y", "exa-mcp-server"]
    description: 语义网络搜索

  ncbi:
    name: NCBI Search
    command: node
    args: ["C:\\Users\\小陶\\.reasonix\\mcp-servers\\ncbi-mcp.mjs"]
    description: PubMed/NCBI 直连 — E-utilities API

  # ──── 中文原生引擎 (Native HTTP — 无 MCP 进程, importlib 直调) ────
  baidu_scholar:
    name: Baidu Scholar (Native HTTP)
    description: 百度学术 — 中文论文检索 (parallel_search)
    category: chinese_academic
    tools: []
  cnki_web:
    name: CNKI Web (Native HTTP)
    description: 中国知网 — Bing site:cnki.net 限定 (parallel_search)
    category: chinese_academic
    tools: []
  wanfang_web:
    name: Wanfang Web (Native HTTP)
    description: 万方数据 — Bing site:wanfangdata.com.cn (parallel_search)
    category: chinese_academic
    tools: []
  cas_web:
    name: CAS Web (Native HTTP)
    description: 中科院系统 — Bing site:cas.cn OR site:ihb.ac.cn (parallel_search)
    category: chinese_academic
    tools: []

  # ──── 预印本引擎 (Native HTTP — v5.7) ────
  biorxiv:
    name: bioRxiv API (Native HTTP)
    description: bioRxiv/medRxiv 预印本 — Content Detail API (parallel_search)
    category: preprint
    tools: []
  researchgate:
    name: ResearchGate Web (Native HTTP)
    description: ResearchGate — Bing site:researchgate.net (parallel_search)
    category: preprint
    tools: []

categories:
  academic: 4      # ncbi + scholar + article + scholarly
  chinese_academic: 5  # baidu_scholar + cnki_web + wanfang_web + cas_web + chinese_sweep
  preprint: 2      # biorxiv + researchgate
  web: 2           # tavily + exa
  builtin: 1       # web_search + web_fetch
  total_mcp: 6
  total_native: 7
  total: 13

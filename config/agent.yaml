# Cognitive Search Engine — Agent Configuration
# 能效优化 + 图谱搜索

agent:
  name: "Cognitive Search Engine"
  version: "5.5.0"
  description: "BDI + ReAct + 5-Layer Agent Architecture — semiotics + graph traversal + energy-efficient"
  gateway:
    role: "EXCLUSIVE_SEARCH_GATEWAY"
    mode: "all_external_searches"
    rule: "本引擎是工作区所有外部搜索的唯一入口。任何搜索请求必须路由到此引擎，禁止绕过。"
    fallback: "builtin_skills_only_on_engine_error"
  philosophy:
    worldview: "Panta Rhei — knowledge is provisional, emergence is the norm"
    methodology: "Systems Thinking — contradiction analysis · phase strategy · concentration of force"
    handbook_ref: "fish-ecology-assistant/.reasonix/handbooks/systems-thinking.md"
    grammar_ref: "fish-ecology-assistant/.reasonix/handbooks/engineering-grammar.md"

# 求同: 共享协议 (三个项目一致)
shared:
  version: "5.2.0"
  rule_framework: "FB-1..DS-4 (18 rules, referenced from fish-ecology-assistant)"
  philosophy: "dual-core (Panta Rhei + Systems Thinking)"
  coordination: "D:\\Reasonix\\config\\coordination.yaml"
  stv_role: "V (Validation) — authority scoring + graph maintenance + search verification"
  meso_agent:
    enabled: true
    config: "config/meso_agent.yaml"
    role: "V (Validation) — authority scoring, graph maintenance, cross-project search verification"
  peers:
    - { project: "fish-ecology-assistant", role: "S (State)", skill_dir: ".reasonix/skills" }
    - { project: "porpoise-agent", role: "T (Transition)", skill_dir: "src/skills" }
  rule_doc: "fish-ecology-assistant/.reasonix/handbooks/engineering-grammar.md (canonical source)"
  graph_path: "config/species_graph.yaml (shared across all three projects via submodule)"

# 超时/重连/并行 配置
timeout:
  http_retry_max_s: 60             # HTTP 重试总窗口 (1分钟内均可重连)
  http_retry_attempts: 5            # 最多重试 5 次
  http_per_call_timeout_s: 15       # 单次 HTTP 请求超时
  mcp_parallel_timeout_s: 180       # MCP 并行总超时 (3分钟)
  mcp_per_call_timeout_s: 30        # MCP 单次调用超时
  mcp_parallel_max_workers: 7       # MCP 并行最大连接数 (7 搜索引擎)

# LLM 配置
llm:
  provider: deepseek
  model: deepseek-chat
  api_base: https://api.deepseek.com/v1
  params:
    max_tokens: 4096
    temperature: 0.3

search:
  # 能效优化 (Energy Efficiency)
  energy:
    max_total_tokens: 50000         # 单次搜索最大 token 预算
    min_papers_satisfice: 8         # 找到 8 篇即满足 (satisfice)
    max_papers_target: 20           # 理想目标
    stop_on_diminishing: true       # 边际收益递减时停止

  # 渐进深化 (Progressive Deepening)
  progressive:
    cheap_layers_first: true        # 先跑便宜的层
    cost_per_layer:                 # 每层估算 token 成本
      exact: 500
      variant: 1500
      author: 2000
      citation: 1000
      phonetic: 800
      llm_expansion: 3000
      journal_scan: 1200

  # 图谱搜索 (Graph Traversal)
  graph:
    enabled: true
    max_depth: 3                    # 最大遍历深度
    max_branching: 5                # 每节点最大分支数
    edge_types:                     # 关系类型
      - cites                        # A 引用 B
      - cited_by                     # A 被 B 引用
      - co_author                    # A 和 B 有共同作者
      - same_journal                 # A 和 B 发表在同一期刊
      - same_species                 # A 和 B 关于同一物种

  # 信息增益/Token 优化
  info_gain:
    track_per_layer: true           # 追踪每层 IG/token
    reorder_on_fly: true            # 根据实际 IG 动态重排
    prune_low_ig: true              # 低 IG 层自动剪枝
    ig_threshold: 0.005             # IG < 0.005 → 停止该层

# 符号学配置
semiotics:
  enabled: true
  signifier_decomposition: true     # 能指分解 (词根+词缀)
  ocr_error_model: true             # OCR 错误概率模型
  ipa_transcription: true           # IPA 语音转录

# 逻辑推理配置
logic:
  deductive_chain: true             # 演绎链 (作者→期刊→年份)
  abductive_inference: true         # 溯因推理 (最佳解释)
  inductive_pattern: true           # 归纳模式 (typo 率统计)

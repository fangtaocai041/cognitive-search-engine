# Cognitive Search Engine — Agent Configuration
# 能效优化 + 图谱搜索

agent:
  name: "Cognitive Search Engine"
  version: "5.5.0"
  description: "BDI + ReAct + 5-Layer Agent Architecture — semiotics + graph traversal + energy-efficient"
  philosophy:
    worldview: "Panta Rhei — knowledge is provisional, emergence is the norm"
    methodology: "Systems Thinking — contradiction analysis · phase strategy · concentration of force"
    handbook_ref: "fish-ecology-assistant/.reasonix/handbooks/systems-thinking.md"
    grammar_ref: "fish-ecology-assistant/.reasonix/handbooks/engineering-grammar.md"

# 求同: 共享协议 (三个项目一致)
# Fish-ecology-assistant 和 porpoise-agent 已有此节。Cognitive 加入以统一协调。
shared:
  version: "5.2.0"
  rule_framework: "FB-1..DS-4 (18 rules, referenced from fish-ecology-assistant)"
  philosophy: "dual-core (Panta Rhei + Systems Thinking)"
  coordination: "D:\\Reasonix\\coordination.yaml"
  stv_role: "V (Validation) — authority scoring + graph maintenance + search verification"
  meso_agent:
    enabled: true
    config: "D:\\Reasonix\\config\\meso_agent.yaml"
    skill: "D:\\Reasonix\\skills\\meso-orchestrator.md"
    role: "V (Validation) — authority scoring, graph maintenance, cross-project search verification"
  peers:
    - { project: "fish-ecology-assistant", role: "S (State)", skill_dir: ".reasonix/skills" }
    - { project: "porpoise-agent", role: "T (Transition)", skill_dir: "src/skills" }
  rule_doc: "fish-ecology-assistant/.reasonix/handbooks/engineering-grammar.md (canonical source)"
  graph_path: "config/species_graph.yaml (shared across all three projects via submodule)"

# DeepSeek 标准配置 (YAML 1.2)
llm:
  provider: deepseek
  model: deepseek-chat
  api_base: https://api.deepseek.com/v1
  api_key: ${DEEPSEEK_API_KEY}
  params:
    temperature: 0.7
    max_tokens: 8192

# Gemini 兼容配置
gemini:
  provider: google
  model: gemini-2.5-pro
  api_base: https://generativelanguage.googleapis.com/v1beta
  api_key: ${GEMINI_API_KEY}
  safety_settings:
    category: [HARM_CATEGORY_HARASSMENT, HARM_CATEGORY_HATE_SPEECH]
    threshold: BLOCK_ONLY_HIGH
  tools_schema: "config/tools.json"

# OpenAI 兼容配置
openai:
  provider: openai
  model: gpt-4o
  api_base: https://api.openai.com/v1
  api_key: ${OPENAI_API_KEY}
  tools_schema: "config/tools.json"

search:
  # 搜索引擎列表 [v2.0 升级]
  engines: ["ncbi","scholar","article","scholarly","tavily","exa","web_search"]
  engine_categories:
    academic: ["ncbi","scholar","article","scholarly"]
    web: ["tavily","exa"]
    fallback: ["web_search"]

  # 自适应搜索深度 (Adaptive Search Depth)
  adaptive:
    enabled: true
    volume_estimation: true          # 搜索前先估算文献量
    modes:
      exhaustive:                    # 文献量 < 20: 穷举
        max_volume: 20
        satisficing: false
        all_layers: true
        graph_depth: 3
        stop_condition: "2 consecutive layers with 0 new papers"
      classified:                    # 文献量 20-200: 分类归纳
        min_volume: 20
        max_volume: 200
        phase1_classify: true        # 先分类不展开
        phase2_drill_down: true      # 人选类别后穷举
      satisficing:                   # 文献量 > 200: 满意即止
        min_volume: 200
        threshold: 12                # 找到 12 篇代表性论文即满足

  # 能效优化 (Energy Efficiency)
  energy:
    max_total_tokens: 50000
    min_papers_satisfice: 8
    max_papers_target: 20
    stop_on_diminishing: true

  # 渐进深化 (Progressive Deepening)
  progressive:
    cheap_layers_first: true        # 先跑便宜的层
    cost_per_layer:                 # 每层估算 token 成本
      exact: 500
      variant: 1500
      author: 2000
      citation: 1000
      phonetic: 800
      llm_expansion: 3000
      journal_scan: 1200

  # 图谱搜索 (Graph Traversal)
  graph:
    enabled: true
    max_depth: 3                    # 最大遍历深度
    max_branching: 5                # 每节点最大分支数
    edge_types:                     # 关系类型
      - cites                        # A 引用 B
      - cited_by                     # A 被 B 引用
      - co_author                    # A 和 B 有共同作者
      - same_journal                 # A 和 B 发表在同一期刊
      - same_species                 # A 和 B 关于同一物种

  # 信息增益/Token 优化
  info_gain:
    track_per_layer: true           # 追踪每层 IG/token
    reorder_on_fly: true            # 根据实际 IG 动态重排
    prune_low_ig: true              # 低 IG 层自动剪枝
    ig_threshold: 0.005             # IG < 0.005 → 停止该层

# ══════════════════════════════════════════════════════════════
# 5 层 Agent 架构配置 (Standard Agent Architectural Model v5.0)
# ══════════════════════════════════════════════════════════════
architecture:
  mode: "react"                     # "react" | "linear"
  description: "BDI + ReAct + Memory — 5 层标准智能体架构"

  layers:
    perception:
      module: "SearchRuleEngine.execute()"
      inputs: [species_id, genus, species, chinese_name, doi]
      multimodal: false

    cognitive:
      module: "src/agent_core.py"
      paradigm: "BDI + ReAct"
      think: "BDI policy: π(Belief, Desire) → Intention"
      act: "Execute phases via rule_engine._execute_phase"
      observe: "Count new papers, compute IG, update Belief"
      reflect: "Compare Belief vs Desire → continue/restructure/stop"

    memory:
      module: "src/memory_layer.py"
      short_term: "ContextTracker — 当前搜索上下文 (LLM context window)"
      long_term: "GraphMemory — species_graph.yaml + 反向索引"

    mapping:
      module: "search_rules.yaml + PHASE_FUNCTIONS"
      routing: "Intention.active_phases → PhaseSpec.tools"
      serialization: "query → URL-encoded REST / JSON-RPC MCP"

    execution:
      module: "rule_engine._http_search / _mcp_search"
      tools: [PubMed, Crossref, scholar-mcp, article-mcp, scholarly-mcp]

  bdi:
    desire:
      min_papers: 8
      max_tokens: 50000
      min_precision: 0.85
    belief:
      discovery_rate: 0.3
      token_per_paper: 250.0

# 符号学配置
semiotics:
  enabled: true
  signifier_decomposition: true     # 能指分解 (词根+词缀)
  ocr_error_model: true             # OCR 错误概率模型
  ipa_transcription: true           # IPA 语音转录

# 逻辑推理配置
logic:
  deductive_chain: true             # 演绎链 (作者→期刊→年份)
  abductive_inference: true         # 溯因推理 (最佳解释)
  inductive_pattern: true           # 归纳模式 (typo 率统计)

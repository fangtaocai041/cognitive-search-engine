name: Validate

on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate config structure
        run: |
          echo "Checking config files..."
          test -f config/agent.yaml && echo "✅ agent.yaml" || echo "❌ agent.yaml missing"
          test -f config/mcp_servers.yaml && echo "✅ mcp_servers.yaml" || echo "❌ mcp_servers.yaml missing"
          test -f config/species_graph.yaml && echo "✅ species_graph.yaml" || echo "❌ species_graph.yaml missing"
      - name: Validate skills
        run: |
          for skill in skills/*.md; do
            name=$(basename "$skill")
            grep -q '^---$' "$skill" && echo "✅ $name" || echo "❌ $name: missing frontmatter"
          done
      - name: Cross-Project Validation (S-T-V)
        if: always()
        run: |
          echo "🔗 Running cross-project validation..."
          if [ -f ../scripts/validate_cross_project.py ]; then
            python ../scripts/validate_cross_project.py --ci
          else
            echo "⚠️ Cross-project script not found (expected at workspace root)"
          fi
